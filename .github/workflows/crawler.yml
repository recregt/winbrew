name: Catalog Release

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/crawler.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Publish Catalog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: infra/go.mod

      - name: Build catalog
        env:
          WINBREW_DB_PATH: ${{ github.workspace }}/catalog.db
        run: |
          cd infra
          go run ./cmd/crawler

      - name: Publish catalog release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Catalog Database
          target_commitish: main
          files: catalog.db
          make_latest: false
          body: Latest generated catalog database.