name: Catalog Publish

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # every day at 6:00 UTC

permissions:
  contents: read

concurrency:
  group: catalog-publish
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  publish:
    name: Build and Publish Catalog Bundle
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 120

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CATALOG_PUBLIC_BASE_URL: ${{ vars.CATALOG_PUBLIC_BASE_URL || 'https://cdn.winbrew.dev' }}
      R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
      R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME || 'winbrew-assets' }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY || secrets.AWS_SECRET_ACCESS_KEY }}
      WINBREW_UPDATE_DB_NAME: ${{ vars.WINBREW_UPDATE_DB_NAME || 'winbrew-update' }}
      WINBREW_UPDATE_DB_ID: ${{ vars.WINBREW_UPDATE_DB_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: infra/crawler/go.mod
          cache: true
          cache-dependency-path: infra/**/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: true

      - name: Build catalog bundle
        run: |
          set -euo pipefail

          staging="$(mktemp -d)"
          winget_jsonl="$staging/winget_source.jsonl"
          catalog_db="$staging/catalog.db"
          metadata_json="$staging/metadata.json"

          (cd infra/crawler && go run ./cmd/crawler --config config.yaml --winget-out "$winget_jsonl") \
            | cargo run --locked -p winbrew-infra-parser -- --winget-jsonl "$winget_jsonl" --out "$catalog_db" --metadata "$metadata_json"

          {
            echo "CATALOG_DB=$catalog_db"
            echo "CATALOG_METADATA=$metadata_json"
          } >> "$GITHUB_ENV"

      - name: Publish catalog bundle to R2 and prepare update plans
        working-directory: infra/publisher
        run: |
          set -euo pipefail

          mkdir -p .generated

          if [ -z "$WINBREW_UPDATE_DB_ID" ]; then
            echo "WINBREW_UPDATE_DB_ID is required to materialize update_plans"
            exit 1
          fi

          cat > .generated/wrangler.production.jsonc <<EOF
{
  "\$schema": "node_modules/wrangler/config-schema.json",
	"name": "update",
	"d1_databases": [
		{
			"binding": "DB",
      "database_name": "$WINBREW_UPDATE_DB_NAME",
			"database_id": "$WINBREW_UPDATE_DB_ID"
		}
	]
}
EOF

          current_hash=$(node -e "const fs=require('fs'); const metadata=JSON.parse(fs.readFileSync(process.env.CATALOG_METADATA, 'utf8')); process.stdout.write(metadata.current_hash || '');")
          previous_hash=$(node -e "const fs=require('fs'); const metadata=JSON.parse(fs.readFileSync(process.env.CATALOG_METADATA, 'utf8')); process.stdout.write(metadata.previous_hash || '');")

          if [ -n "$previous_hash" ] && [ "$previous_hash" != "$current_hash" ]; then
            query=$(cat <<EOF
WITH RECURSIVE lineage(hash, parent_hash, depth) AS (
  SELECT hash, parent_hash, 0 AS depth
  FROM release_lineage
  WHERE hash = '$current_hash'
  UNION ALL
  SELECT rl.hash, rl.parent_hash, lineage.depth + 1
  FROM release_lineage rl
  JOIN lineage ON rl.hash = lineage.parent_hash
  WHERE lineage.hash <> '$previous_hash'
)
SELECT depth, pa.file_path, pa.size_bytes, EXISTS(SELECT 1 FROM lineage WHERE hash = '$previous_hash') AS reached_previous
FROM lineage
JOIN patch_artifacts pa ON pa.from_hash = lineage.parent_hash AND pa.to_hash = lineage.hash
WHERE lineage.hash <> '$previous_hash'
ORDER BY depth DESC;
EOF
)

            npx --yes wrangler@4.83.0 d1 execute DB --remote --config .generated/wrangler.production.jsonc --json --command "$query" > .generated/patch_chain.raw.json

            node <<'NODE'
const fs = require('fs');
const raw = JSON.parse(fs.readFileSync('.generated/patch_chain.raw.json', 'utf8'));
const rows = Array.isArray(raw) && raw[0] && Array.isArray(raw[0].results)
  ? raw[0].results.map((row) => ({
      depth: Number(row.depth ?? 0),
      file_path: String(row.file_path ?? ''),
      size_bytes: Number(row.size_bytes ?? 0),
      reached_previous: Boolean(row.reached_previous),
    }))
  : [];
fs.writeFileSync('.generated/patch_chain.json', `${JSON.stringify(rows, null, 2)}\n`);
NODE
          else
            printf '[]\n' > .generated/patch_chain.json
          fi

          go run ./cmd/publisher --input "$CATALOG_DB" --metadata "$CATALOG_METADATA" --key "catalog/latest.db.zst" --update-plans .generated/update_plans.sql --patch-chain .generated/patch_chain.json

      - name: Publish update plans to D1
        if: ${{ hashFiles('infra/publisher/.generated/update_plans.sql') != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute DB --remote --config infra/publisher/.generated/wrangler.production.jsonc --file infra/publisher/.generated/update_plans.sql --yes