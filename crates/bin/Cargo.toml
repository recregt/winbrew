[package]
name = "winbrew-bin"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[[bin]]
name = "winbrew"
path = "src/main.rs"

[lib]
name = "winbrew"

[dependencies]
winbrew-cli = { path = "../cli" }

clap = { version = "4", default-features = false, features = ["color", "derive", "error-context", "help", "std", "suggestions", "usage"] }

[target.'cfg(windows)'.dependencies]
mimalloc = "0.1"

[build-dependencies]
winresource = "0.1"

[dev-dependencies]
anyhow.workspace = true
mockito = "1.7.2"
rusqlite = { version = "0.39", default-features = false, features = ["bundled", "modern_sqlite", "unlock_notify"] }
serde_json = "1"
tempfile = "3"
winbrew-core = { path = "../core" }
winbrew-ui = { path = "../ui" }
winbrew-models = { path = "../models" }
zip = "8"

[[test]]
name = "cli_tests"
path = "tests/cli.rs"

[[test]]
name = "config_tests"
path = "tests/commands/config.rs"

[[test]]
name = "doctor_tests"
path = "tests/commands/doctor.rs"