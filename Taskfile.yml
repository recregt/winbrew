# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  tools:install-lefthook:
    desc: Install Lefthook for local or CI use
    cmds:
      - go install github.com/evilmartians/lefthook/v2@v1.13.6

  tools:install-nextest:
    desc: Install cargo-nextest for local development
    cmds:
      - cargo install --locked cargo-nextest --version 0.9.132 --force

  test:
    desc: Run Rust tests with cargo test
    cmds:
      - cargo test --locked --all-targets --all-features

  test:nextest:
    desc: Run Rust tests with cargo-nextest
    cmds:
      - cargo nextest run --locked --all-targets --all-features

  test:pre-commit:
    desc: Run lefthook pre-commit checks
    cmds:
      - lefthook run pre-commit --all-files

  check:
    desc: Run cargo fmt
    cmds:
      - cargo fmt --all -- --check

  check:clippy:
    desc: Run cargo clippy
    cmds:
      - cargo clippy --locked --all-targets --all-features -- -D warnings

  infra:pre-commit:
    desc: Run Go checks and tests for the infra module
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/infra/pre-commit.ps1

  infra:pre-push:
    desc: Run Go linters for the infra module
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/infra/pre-push.ps1

  test:infra:
    desc: Run infra (Go) tests
    cmds:
      - task: infra:pre-commit

  ci:smoke:
    desc: Build and smoke-test the CLI
    vars:
      ROOT: target\winbrew-ci
      BINARY: target\x86_64-pc-windows-msvc\release\winbrew.exe
    cmds:
      - cargo build --locked --release
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/tasks/smoke.ps1 -BinaryPath '{{.BINARY}}' -ROOT '{{.ROOT}}'

  ci:pre-commit:
    desc: Run pre-commit checks for CI
    cmds:
      - task: check
      - cargo check --locked
      - task: infra:pre-commit
      - task: test:nextest

  ci:pre-push:
    desc: Run pre-push checks for CI
    cmds:
      - task: test
      - task: check:clippy
      - task: infra:pre-push
      - task: ci:smoke

  ci:verify:
    desc: Run the CI verification task set directly
    cmds:
      - task: infra:pre-commit
      - task: infra:pre-push
      - task: check
      - cargo check --locked
      - task: check:clippy
      - task: test:nextest
      - task: ci:smoke

  dev:run:
    desc: Run the CLI with a repo-local development root
    env:
      WINBREW_PATHS_ROOT: target\winbrew-dev
    cmds:
      - cargo run --locked -- {{.CLI_ARGS}}

  dev:run-release:
    desc: Run the CLI in release mode with a repo-local development root
    env:
      WINBREW_PATHS_ROOT: target\winbrew-dev
    cmds:
      - cargo run --locked --release -- {{.CLI_ARGS}}

  dev:clean:
    desc: Remove the repo-local development root
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "Remove-Item -LiteralPath 'target\winbrew-dev' -Recurse -Force -ErrorAction SilentlyContinue"
