name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.githooks/**'
      - '.github/dependabot.yml'
      - '.gitignore'
      - '.gitattributes'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI checks and smoke tests
    runs-on: windows-latest
    if: github.event_name != 'schedule'
    env:
      ROOT: target\winbrew-ci
      BINARY: target\x86_64-pc-windows-msvc\debug\winbrew.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache cargo-nextest binary
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\winbrew\nextest
          key: nextest-0.9.132-${{ runner.os }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: infra/go.mod

      - name: Setup Task
        uses: go-task/setup-task@v1
        with:
          version: 3.x

      - name: Verify checks
        run: task ci:verify

      - name: Test suite
        run: task ci:test

      - name: Smoke tests
        run: task ci:smoke ROOT="$env:ROOT" BINARY="$env:BINARY"