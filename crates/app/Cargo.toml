[package]
name = "winbrew-app"
version = "0.1.0"
edition = "2024"
rust-version = "1.85" # MSRV:3
license = "MIT OR Apache-2.0"

[dependencies]
winbrew-core = { path = "../core" }
winbrew-engines = { path = "../engines" }
winbrew-models = { path = "../models" }
winbrew-runtime = { path = "../runtime" }
winbrew-ui = { path = "../ui" }

clap = { version = "4", default-features = false, features = ["color", "derive", "error-context", "help", "std", "suggestions", "usage"] }
indicatif = { version = "0.18", default-features = false, features = ["unicode-width"] }

rusqlite = { version = "0.39", default-features = false, features = ["bundled", "unlock_notify"] }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "1"
r2d2 = "0.8"

thiserror = "2.0"
anyhow = "1"
rayon = "1.11"
tracing = "0.1"
tracing-subscriber = { version = "0.3", default-features = false, features = ["ansi", "env-filter", "fmt", "registry", "std"] }
tempfile = "3"

[build-dependencies]
chrono = { version = "0.4", features = ["clock"] }

[dev-dependencies]
mockito = "1.7.2"
zip = "8"