[registries.crates-io]
protocol = "sparse"

[build]
target = "x86_64-pc-windows-msvc"

[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"
rustflags = [
	"-C",
	"target-feature=+crt-static",
	"-C",
	"target-cpu=x86-64-v3",
	"-C",
	"link-arg=/INCREMENTAL:NO",
	"-C",
	"link-arg=/OPT:REF",
	"-C",
	"link-arg=/OPT:ICF",
]

# Nightly-only std rebuilding is intentionally omitted here.
