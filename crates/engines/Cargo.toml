[package]
name = "winbrew-engines"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[dependencies]
anyhow = "1"
regex = "1.12"
strum_macros = "0.28"
url = "2"
zip = "8"
winbrew-models = { path = "../models" }

[target.'cfg(windows)'.dependencies]
windows = { version = "0.62.2", features = ["ApplicationModel", "Foundation", "Management_Deployment"] }

[dev-dependencies]
tempfile = "3"