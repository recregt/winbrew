[package]
name = "winbrew"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[[bin]]
name = "wb"
path = "src/main.rs"

[dependencies]
winreg = "0.56"
clap = { version = "4", features = ["derive"] }
dialoguer = "0.12"
indicatif = "0.18"
anyhow = "1"
strum = "0.28.0"
strum_macros = "0.28.0"
regex = "1.12.3"
rayon = "1.11.0"
comfy-table = "7.2.2"
rusqlite = { version = "0.39", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
toml = "1"
hex = "0.4"
reqwest = { version = "0.13", features = ["blocking"] }
memmap2 = "0.9"
zip = "8.2.0"

[target.'cfg(target_env = "msvc")'.dependencies]
sha2 = "0.10"

[target.'cfg(not(target_env = "msvc"))'.dependencies]
sha2 = { version = "0.10", features = ["asm"] }

[build-dependencies]
winres = "0.1"

[profile.release]
opt-level = 3
lto = true
strip = true
codegen-units = 1
