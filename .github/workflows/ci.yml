name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.githooks/**'
      - '.github/dependabot.yml'
      - '.gitignore'
      - '.gitattributes'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Rustfmt + Clippy
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  integration:
    name: Integration tests (Windows)
    runs-on: windows-latest
    needs: checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: wb --version
        run: .\target\debug\wb.exe --version

      - name: wb --help
        run: .\target\debug\wb.exe --help

      - name: wb list (empty)
        run: .\target\debug\wb.exe list

      - name: wb install node
        run: .\target\debug\wb.exe install node

      - name: wb list (node should appear)
        run: |
          $out = .\target\debug\wb.exe list | Out-String
          Write-Host $out
          if ($out -notmatch "node") {
            Write-Error "Expected 'node' in list output"; exit 1
          }

      - name: wb remove node
        run: .\target\debug\wb.exe remove node --yes

      - name: wb list (node should be gone)
        run: |
          $out = .\target\debug\wb.exe list | Out-String
          Write-Host $out
          if ($out -match "node") {
            Write-Error "node should not appear after remove"; exit 1
          }

  dependabot-metadata:
    name: Dependabot metadata
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "Dependency type: ${{ steps.metadata.outputs.dependency-type }}"
          echo "Update type: ${{ steps.metadata.outputs.update-type }}"