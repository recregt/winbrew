commit-msg:
  jobs:
    - run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/tasks/commit-msg.ps1 '{1}'

pre-commit:
  parallel: true
  commands:
    rust:
      run: task ci:rust:fast
    go-crawler:
      glob: "infra/crawler/**/*.go"
      root: "infra/"
      run: task ci:go:crawler
    go-publisher:
      glob: "infra/publisher/**/*.go"
      root: "infra/"
      run: task ci:go:publisher

pre-push:
  parallel: true
  commands:
    rust:
      run: task ci:rust
    go-crawler:
      glob: "infra/crawler/**/*.go"
      root: "infra/"
      run: task ci:go:crawler
    go-publisher:
      glob: "infra/publisher/**/*.go"
      root: "infra/"
      run: task ci:go:publisher
