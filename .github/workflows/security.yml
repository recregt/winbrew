name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: semgrep/semgrep-action@v1
        with:
          config: p/default
          generateSarif: true
          auditOn: push pull_request schedule
        env:
          SEMGREP_SEND_METRICS: 0

      - uses: github/codeql-action/upload-sarif@v3
        if: failure() || success()
        with:
          sarif_file: semgrep.sarif

  cargo-audit:
    name: Rust Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Audit Rust Dependencies
        uses: actions-rust-lang/audit@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          createIssues: true

  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
          GITLEAKS_ENABLE_SUMMARY: true
          GITLEAKS_REPORT_FORMAT: sarif
          GITLEAKS_REPORT_PATH: gitleaks.sarif

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gitleaks.sarif

  govulncheck:
    name: Go Vuln Check (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [crawler, publisher]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: infra/${{ matrix.module }}/go.mod
          cache-dependency-path: infra/${{ matrix.module }}/go.sum

      - uses: golang/govulncheck-action@v1
        with:
          work-dir: infra/${{ matrix.module }}
          go-version-file: infra/${{ matrix.module }}/go.mod
          output-format: sarif
          output-file: govulncheck.sarif

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: infra/${{ matrix.module }}/govulncheck.sarif

  actionlint:
    name: Lint Workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: raven-actions/actionlint@v2
        with:
          fail-on-error: true
          flags: "-ignore SC2086"
