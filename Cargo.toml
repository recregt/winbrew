[workspace]
members = [".", "crates/models", "infra/parser"]
resolver = "2"

[package]
name = "winbrew"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[[bin]]
name = "winbrew"
path = "src/main.rs"

[dependencies]
winbrew-models = { path = "crates/models" }
winreg = "0.56"
reqwest = { version = "0.12", features = ["blocking", "rustls-tls"], default-features = false }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
sha2 = "0.11"
sha1 = "0.11"
md-5 = "0.11"
zip = "8"

clap = { version = "4", default-features = false, features = ["color", "derive", "error-context", "help", "std", "suggestions", "usage"] }
dialoguer = { version = "0.12", default-features = false }
indicatif = { version = "0.18", default-features = false, features = ["unicode-width"] }
comfy-table = "7.2"
console = { version = "0.16", default-features = false, features = ["std"] }
terminal_size = "0.4"
unicode-width = "0.2"

rusqlite = { version = "0.39", default-features = false, features = ["bundled", "unlock_notify"] }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "1"
r2d2 = "0.8"

thiserror = "2.0"
anyhow = "1"
regex = "1.12"
rayon = "1.11"
ctrlc = "3"
strum = "0.28"
strum_macros = "0.28"
tracing = "0.1"
tracing-subscriber = { version = "0.3", default-features = false, features = ["ansi", "env-filter", "fmt", "registry", "std"] }
tracing-appender = "0.2"
tempfile = "3"

[target.'cfg(windows)'.dependencies]
mimalloc = "0.1"
windows = { version = "0.62.2", features = ["ApplicationModel", "Foundation", "Management_Deployment"] }

[build-dependencies]
chrono = { version = "0.4", features = ["clock"] }
winresource = "0.1"

[dev-dependencies]
mockito = "1.7.2"

[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
