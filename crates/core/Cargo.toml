[package]
name = "winbrew-core"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[dependencies]
anyhow = "1"
chrono = { version = "0.4", features = ["clock"] }
md-5 = "0.11"
reqwest = { version = "0.12", features = ["blocking", "rustls-tls"], default-features = false }
sha1 = "0.11"
sha2 = "0.11"
thiserror = "2.0"
url = "2"
zip = "8"

[dev-dependencies]
tempfile = "3"

[target.'cfg(windows)'.dependencies]
winbrew-windows = { path = "../windows" }
