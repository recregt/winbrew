name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.githooks/**'
      - '.github/dependabot.yml'
      - '.gitignore'
      - '.gitattributes'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Rustfmt + Clippy + Tests
    runs-on: windows-latest
    env:
      WINBREW_ROOT: ${{ github.workspace }}\target\winbrew-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --locked --all-targets --all-features

  integration:
    name: CLI smoke tests (Windows)
    runs-on: windows-latest
    needs: checks
    env:
      BREW_EXE: .\target\x86_64-pc-windows-msvc\debug\brew.exe
      WINBREW_ROOT: ${{ github.workspace }}\target\winbrew-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --locked

      - name: brew --version
        run: |
          & $env:BREW_EXE --version

      - name: brew --help
        run: |
          & $env:BREW_EXE --help

      - name: brew list (empty)
        run: |
          & $env:BREW_EXE list

      - name: brew config seed values
        run: |
          & $env:BREW_EXE config set core.default_yes true
          & $env:BREW_EXE config set core.color false
          & $env:BREW_EXE config set core.download_timeout 31
          & $env:BREW_EXE config set core.concurrent_downloads 3

      - name: brew install smoke test
        continue-on-error: true
        run: |
          $out = & $env:BREW_EXE install windows terminal --select 1 2>&1 | Out-String
          Write-Host $out

      - name: brew config get download_timeout
        run: |
          $out = & $env:BREW_EXE config get core.download_timeout | Out-String
          Write-Host $out
          if ($out -notmatch "core.download_timeout = 31") {
            Write-Error "Expected config get to return the seeded timeout"; exit 1
          }

      - name: brew config list includes seeded values
        run: |
          $out = & $env:BREW_EXE config list | Out-String
          Write-Host $out
          foreach ($needle in @(
            "core.default_yes = true",
            "core.color = false",
            "core.download_timeout = 31",
            "core.concurrent_downloads = 3"
          )) {
            if ($out -notmatch [regex]::Escape($needle)) {
              Write-Error "Expected config list to include '$needle'"; exit 1
            }
          }

      - name: brew info
        run: |
          $out = & $env:BREW_EXE info | Out-String
          Write-Host $out
          if ($out -notmatch "Version:") {
            Write-Error "Expected 'Version:' in info output"; exit 1
          }
          if ($out -notmatch "Database:") {
            Write-Error "Expected 'Database:' in info output"; exit 1
          }
          foreach ($needle in @(
            "Default yes: true",
            "Color: false",
            "Download timeout: 31s",
            "Concurrent downloads: 3"
          )) {
            if ($out -notmatch [regex]::Escape($needle)) {
              Write-Error "Expected info output to include '$needle'"; exit 1
            }
          }

      - name: brew doctor
        run: |
          $out = & $env:BREW_EXE doctor | Out-String
          Write-Host $out
          if ($out -notmatch "Your Winbrew installation is healthy!") {
            Write-Error "Expected doctor to report a healthy installation"; exit 1
          }
          foreach ($needle in @(
            "Installed packages: 0",
            "Broken installs: 0"
          )) {
            if ($out -notmatch [regex]::Escape($needle)) {
              Write-Error "Expected doctor output to include '$needle'"; exit 1
            }
          }

  dependabot-metadata:
    name: Dependabot metadata
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "Dependency type: ${{ steps.metadata.outputs.dependency-type }}"
          echo "Update type: ${{ steps.metadata.outputs.update-type }}"