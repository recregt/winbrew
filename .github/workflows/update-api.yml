name: Update API Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'infra/api/update/**'
      - '.github/workflows/update-api.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: update-api-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Test and Deploy Update Worker
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    defaults:
      run:
        shell: bash
        working-directory: infra/api/update

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: infra/api/update/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test -- --run

      - name: Deploy worker
        run: pnpm exec wrangler deploy -c ./wrangler.jsonc