[package]
name = "winbrew"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "wb"
path = "src/main.rs"

[dependencies]
winreg = "0.56"
clap = { version = "4", features = ["derive"] }
dialoguer = "0.12"
indicatif = "0.18"
anyhow = "1"
strum = "0.28.0"
strum_macros = "0.28.0"
regex = "1.12.3"
rayon = "1.11.0"
comfy-table = "7.2.2"

[build-dependencies]
winres = "0.1"

[profile.release]
opt-level = 3
lto = true
strip = true
codegen-units = 1