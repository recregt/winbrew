[package]
name = "winbrew-bin"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[lib]
name = "winbrew"

[dependencies]
winbrew-install = { path = "../install" }
winbrew-ui = { path = "../ui" }

anyhow.workspace = true
tracing.workspace = true

clap = { version = "4", default-features = false, features = ["color", "derive", "error-context", "help", "std", "suggestions", "usage"] }
indicatif = { version = "0.18", default-features = false, features = ["unicode-width"] }
rusqlite = { version = "0.39", default-features = false, features = ["bundled", "modern_sqlite", "unlock_notify"] }
thiserror = "2.0"
rayon = "1.11"
tempfile = "3"
tracing-appender = "0.2"
tracing-subscriber = { version = "0.3", default-features = false, features = ["ansi", "env-filter", "fmt", "registry", "std"] }

[target.'cfg(windows)'.dependencies]
mimalloc = "0.1"

[build-dependencies]
chrono = { version = "0.4", features = ["clock", "serde"] }
winresource = "0.1"

[dev-dependencies]
mockito = "1.7.2"
zip = "8"