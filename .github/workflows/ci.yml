name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.github/dependabot.yml'
      - '.gitignore'
      - '.gitattributes'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  go:
    name: Go Checks (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - crawler
          - publisher

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: infra/${{ matrix.module }}/go.mod
          cache: true
          cache-dependency-path: infra/${{ matrix.module }}/go.sum

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          install-only: true

      - name: Run Go CI Script
        shell: pwsh
        run: ./scripts/ci/check-go.ps1 -Module ${{ matrix.module }}

  rust-parser:
    name: Rust Parser Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Parser CI Script
        shell: pwsh
        run: ./scripts/ci/check-rust-parser.ps1

  rust:
    name: Rust Checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.132

      - name: Run Rust CI Script
        shell: pwsh
        run: ./scripts/ci/check-rust.ps1

      - name: Smoke test CLI
        shell: pwsh
        run: ./scripts/ci/smoke.ps1 -BinaryPath 'target\x86_64-pc-windows-msvc\release\winbrew.exe' -ROOT 'target\winbrew-ci'
