[package]
name = "winbrew-bin"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[[bin]]
name = "winbrew"
path = "src/main.rs"

[lib]
name = "winbrew"

[dependencies]
winbrew-install = { path = "../install" }
winbrew-ui = { path = "../ui" }
serde_json = "1"

anyhow.workspace = true
tracing.workspace = true

clap = { version = "4", default-features = false, features = ["color", "derive", "error-context", "help", "std", "suggestions", "usage"] }
indicatif = { version = "0.18", default-features = false, features = ["unicode-width"] }
thiserror = "2.0"
rayon = "1.11"
tempfile = "3"
tracing-appender = "0.2"
tracing-subscriber = { version = "0.3", default-features = false, features = ["ansi", "env-filter", "fmt", "registry", "std"] }

[target.'cfg(windows)'.dependencies]
mimalloc = "0.1"

[build-dependencies]
winresource = "0.1"

[dev-dependencies]
mockito = "1.7.2"
rusqlite = { version = "0.39", default-features = false, features = ["bundled", "modern_sqlite", "unlock_notify"] }
winbrew-core = { path = "../core" }
winbrew-models = { path = "../models" }
zip = "8"

[[test]]
name = "cli_tests"
path = "tests/cli.rs"

[[test]]
name = "config_tests"
path = "tests/commands/config.rs"

[[test]]
name = "doctor_tests"
path = "tests/commands/doctor.rs"