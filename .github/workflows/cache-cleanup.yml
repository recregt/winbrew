name: Cleanup Caches

on:
  workflow_dispatch:
    inputs:
      days_old:
        description: Delete caches older than N days
        required: false
        default: '7'
  schedule:
    - cron: '0 2 * * 0'
  pull_request:
    types: [closed]

permissions:
  actions: write

jobs:
  cleanup:
    name: Cleanup Old Caches
    runs-on: ubuntu-latest
    steps:
      - name: Delete PR caches
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          PR_REF="refs/pull/$PR_NUM/merge"
          echo "Deleting caches for PR #$PR_NUM ($PR_REF)"

          gh cache delete --all --ref "$PR_REF" --succeed-on-no-caches

      - name: Delete caches older than ${{ inputs.days_old || 7 }} days
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          DAYS_OLD: ${{ inputs.days_old || 7 }}
        run: |
          set -euo pipefail
          CUTOFF=$(date -d "${DAYS_OLD} days ago" --utc +%Y-%m-%dT%H:%M:%SZ)
          echo "Deleting caches older than $CUTOFF"

          gh cache list --limit 1000 --json id,lastAccessedAt \
            | jq -r --arg cutoff "$CUTOFF" '.[] | select(.lastAccessedAt < $cutoff) | .id' \
            | xargs -r -I {} sh -c 'echo "Deleting: {}"; gh cache delete {}'

      - name: Print remaining cache usage
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh cache list --limit 100