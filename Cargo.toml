[package]
name = "winbrew"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[[bin]]
name = "brew"
path = "src/main.rs"

[dependencies]
# Platform-specific
winreg = "0.56"

# CLI and UI
clap = { version = "4", default-features = false, features = ["color", "derive", "error-context", "help", "std", "suggestions", "usage"] }
dialoguer = { version = "0.12", default-features = false }
indicatif = { version = "0.18", default-features = false, features = ["unicode-width"] }
comfy-table = "7.2"
console = { version = "0.16", default-features = false, features = ["std"] }
terminal_size = "0.4"

# Networking and downloads
reqwest = { version = "0.13", default-features = false, features = ["blocking", "native-tls"] }

# Storage and configuration
rusqlite = { version = "0.39", default-features = false, features = ["bundled", "unlock_notify"] }
chrono = { version = "0.4", features = ["serde"] }
hex = "0.4"
memmap2 = "0.9"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_norway = "0.9"
toml = "1"
r2d2 = "0.8"

# Parsing, matching, and runtime helpers
anyhow = "1"
dashmap = "6"
regex = "1.12"
rayon = "1.11"
strum = "0.28"
strum_macros = "0.28"
tracing = "0.1"
tracing-subscriber = { version = "0.3", default-features = false, features = ["ansi", "env-filter", "fmt", "registry", "std"] }
tracing-appender = "0.2"

[target.'cfg(windows)'.dependencies]
mimalloc = "0.1"

[target.'cfg(target_env = "msvc")'.dependencies]
sha2 = "0.10"

[target.'cfg(not(target_env = "msvc"))'.dependencies]
sha2 = { version = "0.10", features = ["asm"] }

[build-dependencies]
chrono = { version = "0.4", features = ["clock"] }
winresource = "0.1"

[dev-dependencies]
mockito = "1"
tempfile = "3"

[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
