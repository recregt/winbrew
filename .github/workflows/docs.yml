name: Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  deploy:
    name: Docs › Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build Docs
        shell: bash
        env:
          RUSTDOCFLAGS: -D warnings
        run: |
          set -euo pipefail

          cargo doc --locked --workspace --no-deps

          mkdir -p target/gh-pages/docs
          cp -R target/doc/. target/gh-pages/docs/

          cat > target/gh-pages/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=/docs/">
              <title>Winbrew Documentation</title>
            </head>
            <body>
              <p>Redirecting to <a href="/docs/">/docs/</a>...</p>
            </body>
          </html>
          EOF

          printf '%s\n' 'winbrew.recregt.com' > target/gh-pages/CNAME
          touch target/gh-pages/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/gh-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish Page URL
        shell: bash
        run: |
          {
            echo "Documentation published at: ${{ steps.deployment.outputs.page_url }}"
            echo
            echo "Open docs: ${{ steps.deployment.outputs.page_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
