[package]
name = "winbrew"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[[bin]]
name = "wb"
path = "src/main.rs"

[dependencies]
winreg = "0.56"
clap = { version = "4", features = ["derive"] }
dialoguer = "0.12"
indicatif = "0.18"
anyhow = "1"
dashmap = "6"
strum = "0.28.0"
strum_macros = "0.28.0"
regex = "1.12.3"
rayon = "1.11.0"
comfy-table = "7.2.2"
rusqlite = { version = "0.39", features = ["bundled", "unlock_notify"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
toml = "1"
hex = "0.4"
reqwest = { version = "0.13", features = ["blocking"] }
memmap2 = "0.9"
zip = "8.4.0"
term_size = "0.3"
console = "0.15"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
r2d2 = "0.8"

[target.'cfg(windows)'.dependencies]
mimalloc = "0.1"

[target.'cfg(target_env = "msvc")'.dependencies]
sha2 = "0.10"

[target.'cfg(not(target_env = "msvc"))'.dependencies]
sha2 = { version = "0.10", features = ["asm"] }

[build-dependencies]
chrono = { version = "0.4", features = ["clock"] }
winresource = "0.1"

[lints.rust]
dead_code = "warn"

[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
