name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: windows-latest
    env:
      WINBREW_EXE: .\target\x86_64-pc-windows-msvc\release\winbrew.exe
      CARGO_BUILD_TARGET: x86_64-pc-windows-msvc
      RELEASE_TAG: ${{ github.ref_name }}
      WINBREW_SIGNING_PFX_BASE64: ${{ secrets.WINBREW_SIGNING_PFX_BASE64 }}
      WINBREW_SIGNING_PFX_PASSWORD: ${{ secrets.WINBREW_SIGNING_PFX_PASSWORD }}
      WINBREW_SIGNING_TIMESTAMP_URL: ${{ vars.WINBREW_SIGNING_TIMESTAMP_URL || 'http://timestamp.digicert.com' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Ensure Windows target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build
        run: cargo build --release

      - name: Sign Release Binary
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          if ([string]::IsNullOrWhiteSpace($env:WINBREW_SIGNING_PFX_BASE64)) {
            throw 'WINBREW_SIGNING_PFX_BASE64 is required to sign the release binary.'
          }

          if ([string]::IsNullOrWhiteSpace($env:WINBREW_SIGNING_PFX_PASSWORD)) {
            throw 'WINBREW_SIGNING_PFX_PASSWORD is required to sign the release binary.'
          }

          $pfxPath = Join-Path $env:RUNNER_TEMP 'winbrew-signing.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINBREW_SIGNING_PFX_BASE64))

          $signtool = (Get-Command signtool -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty Path)
          if ([string]::IsNullOrWhiteSpace($signtool)) {
            $sdkBinRoot = Join-Path ${env:ProgramFiles(x86)} 'Windows Kits\10\bin'
            $signtool = Get-ChildItem -Path $sdkBinRoot -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
          }

          if ([string]::IsNullOrWhiteSpace($signtool)) {
            throw 'signtool.exe was not found on the runner.'
          }

          try {
            & $signtool sign /f $pfxPath /p $env:WINBREW_SIGNING_PFX_PASSWORD /tr $env:WINBREW_SIGNING_TIMESTAMP_URL /td SHA256 /fd SHA256 $env:WINBREW_EXE
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }

            & $signtool verify /pa /v $env:WINBREW_EXE
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          } finally {
            Remove-Item $pfxPath -Force -ErrorAction SilentlyContinue
          }

      - name: Package
        run: |
          $archiveName = "winbrew-$env:RELEASE_TAG-windows-x86_64.zip"
          mkdir release_pkg
          copy $env:WINBREW_EXE release_pkg\
          copy README.md release_pkg\
          Compress-Archive -Path release_pkg\* -DestinationPath $archiveName

      - name: Checksum
        run: |
          $archiveName = "winbrew-$env:RELEASE_TAG-windows-x86_64.zip"
          $hash = Get-FileHash $archiveName -Algorithm SHA256
          $hash.Hash | Out-File -FilePath ("{0}.sha256" -f $archiveName)

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          configurationJson: |
            {
              "categories": [
                { "title": "🚀 Features", "rules": [{"pattern": "^feat(\\([a-z0-9._/-]+\\))?!?:", "on_property": "title"}] },
                { "title": "🐛 Bug Fixes", "rules": [{"pattern": "^fix(\\([a-z0-9._/-]+\\))?!?:", "on_property": "title"}] },
                { "title": "📖 Documentation", "rules": [{"pattern": "^docs(\\([a-z0-9._/-]+\\))?!?:", "on_property": "title"}] },
                { "title": "🔧 Refactor", "rules": [{"pattern": "^refactor(\\([a-z0-9._/-]+\\))?!?:", "on_property": "title"}] },
                { "title": "⚡ Performance", "rules": [{"pattern": "^perf(\\([a-z0-9._/-]+\\))?!?:", "on_property": "title"}] },
                { "title": "🧹 Chore", "rules": [{"pattern": "^chore(\\([a-z0-9._/-]+\\))?!?:", "on_property": "title"}] },
                { "title": "🎨 Style", "rules": [{"pattern": "^style(\\([a-z0-9._/-]+\\))?!?:", "on_property": "title"}] },
                { "title": "🧪 Tests", "rules": [{"pattern": "^test(\\([a-z0-9._/-]+\\))?!?:", "on_property": "title"}] },
                { "title": "🏗️ Build", "rules": [{"pattern": "^build(\\([a-z0-9._/-]+\\))?!?:", "on_property": "title"}] },
                { "title": "⚙️ CI", "rules": [{"pattern": "^ci(\\([a-z0-9._/-]+\\))?!?:", "on_property": "title"}] },
                { "title": "⏪ Reverts", "rules": [{"pattern": "^revert(\\([a-z0-9._/-]+\\))?!?:", "on_property": "title"}] }
              ],
              "ignore_labels": ["skip-changelog"],
              "sort": "ASC"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: | 
            winbrew-${{ env.RELEASE_TAG }}-windows-x86_64.zip
            winbrew-${{ env.RELEASE_TAG }}-windows-x86_64.zip.sha256
          body: ${{ steps.changelog.outputs.changelog }}