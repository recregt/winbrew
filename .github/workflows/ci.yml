name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.githooks/**'
      - '.github/dependabot.yml'
      - '.gitignore'
      - '.gitattributes'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Rustfmt + Clippy
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  integration:
    name: Integration tests (Windows)
    runs-on: windows-latest
    needs: checks
    env:
      BREW_EXE: .\target\x86_64-pc-windows-msvc\debug\brew.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: brew --version
        continue-on-error: true
        run: $env:BREW_EXE --version

      - name: brew --help
        continue-on-error: true
        run: $env:BREW_EXE --help

      - name: brew list (empty)
        continue-on-error: true
        run: |
          & $env:BREW_EXE list

      - name: brew config seed values
        continue-on-error: true
        run: |
          & $env:BREW_EXE config set ci.integration enabled
          & $env:BREW_EXE config set default_yes true
          & $env:BREW_EXE config set color false
          & $env:BREW_EXE config set download_timeout 31
          & $env:BREW_EXE config set concurrent_downloads 3

      - name: brew config get ci.integration
        continue-on-error: true
        run: |
          $out = & $env:BREW_EXE config get ci.integration | Out-String
          Write-Host $out
          if ($out -notmatch "ci.integration = enabled") {
            Write-Error "Expected config get to return the CI test value"; exit 1
          }

      - name: brew config get download_timeout
        continue-on-error: true
        run: |
          $out = & $env:BREW_EXE config get download_timeout | Out-String
          Write-Host $out
          if ($out -notmatch "download_timeout = 31") {
            Write-Error "Expected config get to return the seeded timeout"; exit 1
          }

      - name: brew config list includes seeded values
        continue-on-error: true
        run: |
          $out = & $env:BREW_EXE config list | Out-String
          Write-Host $out
          foreach ($needle in @(
            "ci.integration = enabled",
            "default_yes = true",
            "color = false",
            "download_timeout = 31",
            "concurrent_downloads = 3"
          )) {
            if ($out -notmatch [regex]::Escape($needle)) {
              Write-Error "Expected config list to include '$needle'"; exit 1
            }
          }

      - name: brew info
        continue-on-error: true
        run: |
          $out = & $env:BREW_EXE info | Out-String
          Write-Host $out
          if ($out -notmatch "Version:") {
            Write-Error "Expected 'Version:' in info output"; exit 1
          }
          if ($out -notmatch "Database:") {
            Write-Error "Expected 'Database:' in info output"; exit 1
          }
          foreach ($needle in @(
            "Default yes: true",
            "Color: false",
            "Download timeout: 31s",
            "Concurrent downloads: 3"
          )) {
            if ($out -notmatch [regex]::Escape($needle)) {
              Write-Error "Expected info output to include '$needle'"; exit 1
            }
          }

      - name: brew doctor
        continue-on-error: true
        run: |
          $out = & $env:BREW_EXE doctor | Out-String
          Write-Host $out
          if ($out -notmatch "Your Winbrew installation is healthy!") {
            Write-Error "Expected doctor to report a healthy installation"; exit 1
          }
          foreach ($needle in @(
            "Installed packages: 0",
            "Broken installs: 0"
          )) {
            if ($out -notmatch [regex]::Escape($needle)) {
              Write-Error "Expected doctor output to include '$needle'"; exit 1
            }
          }

      - name: brew install node
        continue-on-error: true
        run: |
          & $env:BREW_EXE install node

      - name: brew list (node should appear)
        continue-on-error: true
        run: |
          $out = & $env:BREW_EXE list | Out-String
          Write-Host $out
          if ($out -notmatch "node") {
            Write-Error "Expected 'node' in list output"; exit 1
          }

      - name: brew remove node
        continue-on-error: true
        run: |
          & $env:BREW_EXE remove node --yes

      - name: brew list (node should be gone)
        continue-on-error: true
        run: |
          $out = & $env:BREW_EXE list | Out-String
          Write-Host $out
          if ($out -match "node") {
            Write-Error "node should not appear after remove"; exit 1
          }

  dependabot-metadata:
    name: Dependabot metadata
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "Dependency type: ${{ steps.metadata.outputs.dependency-type }}"
          echo "Update type: ${{ steps.metadata.outputs.update-type }}"