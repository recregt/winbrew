name: Catalog Publish

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # every day at 6:00 UTC

permissions:
  contents: write

concurrency:
  group: catalog-publish
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  publish:
    name: Build and Publish Catalog Bundle
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 180

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CATALOG_PUBLIC_BASE_URL: ${{ vars.CATALOG_PUBLIC_BASE_URL || 'https://cdn.winbrew.dev' }}
      CATALOG_OBJECT_KEY: catalog/latest.db.zst
      R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
      R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME || 'winbrew-assets' }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY || secrets.AWS_SECRET_ACCESS_KEY }}
      WINBREW_UPDATE_DB_NAME: ${{ vars.WINBREW_UPDATE_DB_NAME || 'winbrew-update' }}
      WINBREW_UPDATE_DB_ID: ${{ secrets.WINBREW_UPDATE_DB_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Compute crawler cache key
        id: crawler-cache-key
        run: |
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "tag_date=$(date -u +%Y.%m.%d)" >> "$GITHUB_OUTPUT"

      - name: Cache crawler data
        uses: actions/cache@v5
        with:
          path: ~/.cache/winbrew
          key: winbrew-crawler-${{ runner.os }}-${{ steps.crawler-cache-key.outputs.date }}
          restore-keys: |
            winbrew-crawler-${{ runner.os }}-

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: infra/crawler/go.mod
          cache: true
          cache-dependency-path: infra/**/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: true

      - name: Build catalog bundle
        run: |
          set -euo pipefail

          staging="$(mktemp -d)"
          scoop_jsonl="$staging/scoop_source.jsonl"
          winget_jsonl="$staging/winget_source.jsonl"
          catalog_db="$staging/catalog.db"
          metadata_json="$staging/metadata.json"

          echo "Running crawler"
          (cd infra/crawler && go run ./cmd/crawler --config config.yaml --winget-out "$winget_jsonl") \
            | tee "$scoop_jsonl" \
            | cargo run --locked -p winbrew-infra-parser -- --winget-jsonl "$winget_jsonl" --out "$catalog_db" --metadata "$metadata_json"

          if [ ! -s "$scoop_jsonl" ]; then
            echo "::error::crawler produced no scoop JSONL output"
            exit 1
          fi

          if [ ! -s "$winget_jsonl" ]; then
            echo "::error::crawler produced no winget JSONL output"
            exit 1
          fi

          if [ ! -s "$catalog_db" ]; then
            echo "::error::parser did not produce a catalog database"
            exit 1
          fi

          if [ ! -s "$metadata_json" ]; then
            echo "::error::parser did not produce metadata"
            exit 1
          fi

          {
            echo "CATALOG_DB=$catalog_db"
            echo "CATALOG_METADATA=$metadata_json"
          } >> "$GITHUB_ENV"

      - name: Publish catalog bundle to R2 and prepare update plans
        working-directory: infra/publisher
        run: |
          set -euo pipefail

          mkdir -p .generated

          if [ -z "$WINBREW_UPDATE_DB_ID" ]; then
            echo "WINBREW_UPDATE_DB_ID is required to materialize update_plans"
            exit 1
          fi

          schema_prefix='$'

          cat > .generated/wrangler.production.jsonc <<EOF
          {
            "${schema_prefix}schema": "node_modules/wrangler/config-schema.json",
            "name": "update",
            "d1_databases": [
              {
                "binding": "DB",
                "database_name": "$WINBREW_UPDATE_DB_NAME",
                "database_id": "$WINBREW_UPDATE_DB_ID"
              }
            ]
          }
          EOF

          go run ./cmd/publisher --input "$CATALOG_DB" --metadata "$CATALOG_METADATA" --key "$CATALOG_OBJECT_KEY" --update-plans .generated/update_plans.sql --patch-chain .generated/patch_chain.json

      - name: Materialize release lineage to D1
        if: ${{ hashFiles('infra/publisher/.generated/release_materialization.sql') != '' }}
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd
        with:
          apiToken: ${{ secrets.D1_ACCESS_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: d1 execute DB --remote --config infra/publisher/.generated/wrangler.production.jsonc --file infra/publisher/.generated/release_materialization.sql --yes

      - name: Publish update plans to D1
        if: ${{ hashFiles('infra/publisher/.generated/update_plans.sql') != '' }}
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd
        with:
          apiToken: ${{ secrets.D1_ACCESS_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: d1 execute DB --remote --config infra/publisher/.generated/wrangler.production.jsonc --file infra/publisher/.generated/update_plans.sql --yes

      - name: Archive nightly release
        if: ${{ hashFiles('infra/publisher/.generated/update_plans.sql') != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          nightly_date="${{ steps.crawler-cache-key.outputs.date }}"
          nightly_tag="catalog-${{ steps.crawler-cache-key.outputs.tag_date }}-nightly"
          archive_dir="infra/publisher/.generated/nightly"

          rm -rf "$archive_dir"
          mkdir -p "$archive_dir"

          cp "$CATALOG_DB" "$archive_dir/catalog.db"
          zstd --quiet --force --keep -19 "$CATALOG_DB" -o "$archive_dir/catalog.db.zst"
          cp "$CATALOG_METADATA" "$archive_dir/metadata.json"
          cp infra/publisher/.generated/release_materialization.sql "$archive_dir/release_materialization.sql"
          cp infra/publisher/.generated/update_plans.sql "$archive_dir/update_plans.sql"
          cp infra/publisher/.generated/patch_chain.json "$archive_dir/patch_chain.json"

          gh release delete "$nightly_tag" --yes --cleanup-tag >/dev/null 2>&1 || true
          gh release create "$nightly_tag" \
            --target "$GITHUB_SHA" \
            --title "$nightly_tag" \
            --prerelease \
            --notes "Nightly catalog archive for $nightly_date." \
            "$archive_dir/catalog.db" \
            "$archive_dir/catalog.db.zst" \
            "$archive_dir/metadata.json" \
            "$archive_dir/release_materialization.sql" \
            "$archive_dir/update_plans.sql" \
            "$archive_dir/patch_chain.json"
