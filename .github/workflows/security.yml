name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  semgrep:
    name: SAST › Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep

      - name: Run Semgrep Scan
        id: semgrep
        continue-on-error: true
        run: semgrep scan --config p/default --sarif --output semgrep.sarif .
        env:
          SEMGREP_SEND_METRICS: off

      - uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif

      - name: Fail on Semgrep errors
        if: steps.semgrep.outcome == 'failure'
        run: exit 1

  cargo-audit:
    name: Audit › Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Audit Rust Dependencies
        uses: actions-rust-lang/audit@v1
        with:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          createIssues: true

  gitleaks:
    name: Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        id: gitleaks
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
          GITLEAKS_ENABLE_SUMMARY: true

      - name: Move SARIF to workspace
        if: always()
        shell: bash
        run: |
          if [ -f "$HOME/results.sarif" ]; then
            mv "$HOME/results.sarif" gitleaks.sarif
          fi

      - uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('gitleaks.sarif') != ''
        with:
          sarif_file: gitleaks.sarif

  govulncheck:
    name: Vuln › Go (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [crawler, publisher]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: infra/${{ matrix.module }}/go.mod
          cache: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          cache-dependency-path: infra/${{ matrix.module }}/go.sum

      - uses: golang/govulncheck-action@v1
        with:
          repo-checkout: false
          work-dir: infra/${{ matrix.module }}
          go-version-file: infra/${{ matrix.module }}/go.mod
          output-format: sarif
          output-file: infra/${{ matrix.module }}/govulncheck.sarif

      - uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles(format('infra/{0}/govulncheck.sarif', matrix.module)) != ''
        with:
          sarif_file: infra/${{ matrix.module }}/govulncheck.sarif

  actionlint:
    name: Lint › Workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: raven-actions/actionlint@v2
        with:
          fail-on-error: true
          flags: "-ignore SC2086"
