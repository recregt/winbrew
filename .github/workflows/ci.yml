name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.githooks/**'
      - '.github/dependabot.yml'
      - '.gitignore'
      - '.gitattributes'
  pull_request:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Rustfmt + Clippy + Tests
    runs-on: windows-latest
    if: github.event_name != 'schedule'
    env:
      WINBREW_ROOT: ${{ github.workspace }}\target\winbrew-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --locked --all-targets --all-features

  integration:
    name: CLI smoke tests (Windows)
    runs-on: windows-latest
    needs: checks
    if: github.event_name != 'schedule'
    env:
      BREW_EXE: .\target\x86_64-pc-windows-msvc\debug\brew.exe
      WINBREW_ROOT: ${{ github.workspace }}\target\winbrew-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --locked

      - name: brew --version
        run: |
          & $env:BREW_EXE --version

      - name: brew --help
        run: |
          & $env:BREW_EXE --help

      - name: brew list (empty)
        run: |
          & $env:BREW_EXE list

      - name: brew config seed values
        run: |
          & $env:BREW_EXE config set core.default_yes true
          & $env:BREW_EXE config set core.color false
          & $env:BREW_EXE config set core.download_timeout 31
          & $env:BREW_EXE config set core.concurrent_downloads 3

  infra-sync:
    name: Go infra sync
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    env:
      WINBREW_R2_ACCESS_KEY_ID: ${{ secrets.WINBREW_R2_ACCESS_KEY_ID }}
      WINBREW_R2_SECRET_ACCESS_KEY: ${{ secrets.WINBREW_R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: infra/go.mod
          cache-dependency-path: infra/go.sum
          cache: true

      - name: Download dependencies
        working-directory: infra
        run: go mod download

      - name: Run tests
        working-directory: infra
        run: go test ./...

      - name: Build
        working-directory: infra
        run: go build ./...

      - name: Run crawler
        working-directory: infra
        run: go run ./cmd/crawler

      - name: Run publisher
        working-directory: infra
        run: go run ./cmd/publisher

  dependabot-metadata:
    name: Dependabot metadata
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "Dependency type: ${{ steps.metadata.outputs.dependency-type }}"
          echo "Update type: ${{ steps.metadata.outputs.update-type }}"