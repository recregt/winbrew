# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  tools:install-lefthook:
    desc: Install Lefthook for local or CI use
    cmds:
      - go install github.com/evilmartians/lefthook/v2@v1.13.6

  tools:install-nextest:
    desc: Install cargo-nextest for local development
    cmds:
      - cargo install --locked cargo-nextest --version 0.9.132 --force

  tools:install-golangci-lint:
    desc: Install golangci-lint for local development
    cmds:
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4

  test:
    desc: Run Rust tests with cargo test
    cmds:
      - cargo test --locked --all-targets --all-features

  test:nextest:
    desc: Run Rust tests with cargo-nextest
    cmds:
      - cargo nextest run --locked --all-targets --all-features

  test:pre-commit:
    desc: Run lefthook pre-commit checks
    cmds:
      - lefthook run pre-commit --all-files

  check:
    desc: Run cargo fmt
    cmds:
      - cargo fmt --all -- --check

  check:clippy:
    desc: Run cargo clippy
    cmds:
      - cargo clippy --locked --all-targets --all-features -- -D warnings

  check:doc:
    desc: Run cargo doc with warnings denied
    env:
      RUSTDOCFLAGS: -D warnings
    cmds:
      - cargo doc --locked --workspace --no-deps

  ci:docs:
    desc: Run Rust doc checks for the full workspace
    env:
      RUSTDOCFLAGS: -D warnings
    cmds:
      - cargo doc --locked --workspace --document-private-items --no-deps

  ci:smoke:
    desc: Build and smoke-test the CLI
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/ci/smoke.ps1

  ci:go:crawler:
    desc: Run Go CI checks for the crawler module
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/ci/check-go.ps1 -Module crawler

  ci:go:publisher:
    desc: Run Go CI checks for the catalog bundle publisher flow
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/ci/check-go.ps1 -Module publisher

  ci:parser:
    desc: Run Rust CI checks for the catalog parser
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/ci/check-rust-parser.ps1

  ci:rust:
    desc: Run Rust CI checks for the CLI and binary
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/ci/check-rust.ps1

  ci:rust:fast:
    desc: Run fast Rust CI checks for the CLI and binary without nextest
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/ci/check-rust.ps1 -SkipNextest

  ci:verify:
    desc: Run the CI verification task set directly, including bundle validation
    cmds:
      - task: ci:go:crawler
      - task: ci:go:publisher
      - task: ci:parser
      - task: ci:docs
      - task: ci:rust
      - task: ci:smoke

  dev:run:
    desc: Run the CLI with a repo-local development root
    env:
      WINBREW_PATHS_ROOT: target\winbrew-dev
    cmds:
      - cargo run --locked -p winbrew-bin --bin winbrew -- {{.CLI_ARGS}}

  dev:run-release:
    desc: Run the CLI in release mode with a repo-local development root
    env:
      WINBREW_PATHS_ROOT: target\winbrew-dev
    cmds:
      - cargo run --locked -p winbrew-bin --bin winbrew --release -- {{.CLI_ARGS}}

  dev:clean:
    desc: Remove the repo-local development root
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -Command "Remove-Item -LiteralPath 'target\winbrew-dev' -Recurse -Force -ErrorAction SilentlyContinue"
